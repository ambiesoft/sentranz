<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Analysis</title>
  </head>

  <body>
    <div class="layout">
      <div class="toolbar">
        <select id="sentence-select"></select>
        <button id="prev-btn">Prev</button>
        <button id="next-btn">Next</button>
        <div class="toolbar-right">
          <button id="retry-btn">Retry</button>
          <button id="retry-all-error-btn">Retry all Errors</button>
        </div>
      </div>

      <div class="content">
        <div class="tree-pane">Tree</div>
        <div class="right-pane">
          <div id="sentence-pane" class="sentence-pane"></div>

          <div id="error-banner" class="error-banner hidden">
            <span id="error-message"></span>
            <button id="error-close-btn" class="error-close-btn">×</button>
          </div>

          <div id="word-info" class="word-info"></div>

          <div id="ask-answer"></div>
          <div class="ask-pane">
            <textarea id="ask-input" placeholder="Ask AI..."></textarea>
            <button id="ask-btn">Ask</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/analysis.ts"></script>
  </body>
</html>
