<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Analysis</title>
  </head>

  <body>
    <div class="layout">
      <div class="toolbar">
        <button id="prev-btn">Prev</button>
        <select id="sentence-select"></select>
        <button id="next-btn">Next</button>
        <div class="toolbar-right">
          <button id="change-title-btn">Change Title</button>
          <button id="copy-sentences-btn">Copy Sentences</button>
          <button id="retry-this-btn">Retry This</button>
          <button id="retry-from-here-btn">Retry From Here</button>
        </div>
      </div>

      <div class="content">
        <div class="tree-pane">Tree</div>
        <div class="right-pane">
          <div id="sentence-pane" class="sentence-pane"></div>

          <div id="error-banner" class="error-banner hidden">
            <span id="error-message"></span>
            <button id="error-close-btn" class="error-close-btn">×</button>
          </div>

          <!-- Analysis -->
          <div id="analysis-panel" class="panel analysis-panel">
            <div class="panel-header">
              <button id="toggle-analysis">▼ Analysis</button>
            </div>

            <div id="word-info" class="panel-body"></div>
          </div>

          <!-- Ask -->
          <div id="ask-panel" class="panel ask-panel">
            <div class="panel-header">
              <button id="toggle-ask">▶ Ask AI</button>
            </div>

            <div id="ask-answer" class="panel-body hidden"></div>
          </div>

          <!-- Ask Input -->
          <div class="ask-pane">
            <textarea id="ask-input" placeholder="Ask AI..."></textarea>
            <button id="ask-btn">Ask</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/analysis.ts"></script>
  </body>
</html>
