<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentranz</title>
</head>

<body>
  <main class="main-content">
    <section class="input-section">
      <div class="section-header">
        <h2 class="section-title">Input</h2>
        <select id="model-select"></select>
        <button id="settings-btn">Settings</button>
        <button id="clear-btn">Clear</button>
        <button id="paste-html-btn">Paste HTML</button>
        <button id="paste-text-btn">Paste Text</button>
        <button id="split-btn">Split Sentences</button>
      </div>
      <textarea id="input-text" placeholder="Paste plain text here..."></textarea>
    </section>

    <section class="split-section">
      <div class="section-header">
        <h2 class="section-title">Sentences</h2>
        <button id="resplit-btn">Re-split Sentences</button>
        <button id="analyze-btn">Open Analysis Window</button>
      </div>

      <textarea id="sentence-list"></textarea>
    </section>

    <section class="recent-section">
      <div class="section-header">
        <h2 class="section-title">Recent Documents</h2>
        <button id="refresh-recent-btn">Refresh</button>
      </div>

      <div id="recent-list" class="recent-list"></div>
    </section>
  </main>

  <div id="settings-dialog" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close-btn">×</button>
      </div>

      <div class="settings-body">
        <div id="model-list" class="model-list"></div>

        <div class="model-editor">
          <input id="model-name" placeholder="Name" />
          <input id="model-id" placeholder="Model ID" />
          <input id="model-endpoint" placeholder="Endpoint" />
          <input id="model-api-key" placeholder="API Key" />

          <div class="editor-buttons">
            <button id="delete-model-btn">Delete</button>
            <button id="save-model-btn">Save</button>
          </div>
        </div>
      </div>

      <button id="add-model-btn">Add Model</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
