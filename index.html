<body>
  <div class="main-layout">
    <header class="topbar">
      <h1>Sentranz</h1>
    </header>

    <main class="main-content">
      <section class="input-section">
        <div class="section-header">
          <h2 class="section-title">Input</h2>
          <button id="pasteBtn">Paste</button>
          <button id="splitBtn">Split Sentences</button>
        </div>
        <textarea id="inputText" placeholder="Paste text here..."></textarea>
      </section>

      <section class="split-section">
        <div class="section-header">
          <h2 class="section-title">Sentences</h2>
          <button id="analyzeBtn">Open Analysis Window</button>
        </div>

        <textarea id="sentenceList"></textarea>
      </section>

      <section class="action-section">
        <div id="loadingArea"></div>
      </section>

      <section class="results-section">
        <h2>Analysis Progress</h2>

        <div id="results"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
